name: CI

on:
  push:
    branches:
      - '*'
    tags:
      - v*
  pull_request:
  merge_group:

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # Dodano cache dla npm
      - run: npm ci
      - uses: wagoid/commitlint-github-action@v6
        env:
          NODE_PATH: ${{ github.workspace }}/node_modules

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run tsc

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run build
        env:
          CI: true
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write # Wymagane, aby utworzyć Release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      
      # Usunięto setup-python, jeśli jedynym celem było użycie przestarzałych akcji.
      # Bash i komenda 'find' działają natywnie na ubuntu-latest.
      
      - name: Prepare Release Asset Path
        run: |
          # Znajduje plik i ustawia ścieżkę do niego (szuka w folderze dist, a nie w całym repo)
          echo "USERSCRIPT_PATH=$(find dist -type f -name '*.user.js')" >> $GITHUB_ENV
      
      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2 # Nowoczesna, zintegrowana akcja
        with:
          draft: true
          prerelease: false
          files: ${{ env.USERSCRIPT_PATH }} # Automatycznie wgrywa wskazany plik
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
